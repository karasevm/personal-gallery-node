name: Run tests

on:
  workflow_dispatch:
  workflow_call:
  push:
    branches: 
      - main
      - dev

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js LTS
      uses: actions/setup-node@v4
      with:
        node-version: 'lts'
    - run: yarn
    - run: yarn test